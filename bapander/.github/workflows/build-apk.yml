name: Build Bapander APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ─────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter ──────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'
          cache: true

      # ── 4. Decode google-services.json from secret ────────────
      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
        # Tambahkan GOOGLE_SERVICES_JSON di GitHub Secrets (base64 dari file)

      # ── 5. Decode firebase_options.dart from secret ───────────
      - name: Decode firebase_options.dart
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS }}" | base64 --decode > lib/firebase_options.dart
        # Tambahkan FIREBASE_OPTIONS di GitHub Secrets (base64 dari file)

      # ── 6. Get Flutter dependencies ───────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      # ── 7. Analyze code ───────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Run tests ──────────────────────────────────────────
      - name: Run tests
        run: flutter test
        continue-on-error: true

      # ── 9. Build APK (debug) ──────────────────────────────────
      - name: Build Debug APK
        run: flutter build apk --debug --target-platform android-arm64

      # ── 10. Build APK (release) ───────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release --target-platform android-arm64,android-arm,android-x64
        continue-on-error: true

      # ── 11. Build App Bundle ──────────────────────────────────
      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release
        continue-on-error: true

      # ── 12. Upload Debug APK ──────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bapander-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # ── 13. Upload Release APK ────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bapander-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 14. Upload AAB ────────────────────────────────────────
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bapander-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 15. Create release on tag ────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
