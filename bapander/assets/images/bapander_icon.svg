<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E5E3A"/>
      <stop offset="55%" style="stop-color:#094A2C"/>
      <stop offset="100%" style="stop-color:#063D22"/>
    </linearGradient>
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE97A"/>
      <stop offset="25%" style="stop-color:#D4A017"/>
      <stop offset="65%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#7A5C00"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0A0"/>
      <stop offset="40%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#9A7200"/>
    </linearGradient>
    <radialGradient id="bubbleGrad" cx="35%" cy="25%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="70%" style="stop-color:#F2EDD8"/>
      <stop offset="100%" style="stop-color:#E8E0C4"/>
    </radialGradient>
    <linearGradient id="ivoryGrad" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#EBE5CC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#D4A017" flood-opacity="0.7"/>
    </filter>
    <pattern id="batik" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#2A7A50" stroke-width="0.5" opacity="0.2">
        <polygon points="32,4 44,16 44,32 32,44 20,32 20,16"/>
        <circle cx="32" cy="24" r="3"/>
        <circle cx="0" cy="0" r="2"/>
        <circle cx="64" cy="0" r="2"/>
        <circle cx="0" cy="64" r="2"/>
        <circle cx="64" cy="64" r="2"/>
        <line x1="32" y1="4" x2="32" y2="44"/>
        <line x1="10" y1="24" x2="54" y2="24"/>
      </g>
    </pattern>
    <clipPath id="rounded">
      <rect x="0" y="0" width="1024" height="1024" rx="215" ry="215"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="215" ry="215" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="215" ry="215" fill="url(#batik)"/>

  <g clip-path="url(#rounded)">
  <radialGradient id="vig" cx="50%" cy="50%" r="75%">
    <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000;stop-opacity:0.4"/>
  </radialGradient>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#vig)"/>

  <!-- ═══ CRESCENT MOON ═══ -->
  <path d="M 258 122 C 152 180, 80 295, 62 422 C 42 556, 86 684, 172 774 C 247 856, 354 906, 460 912 C 374 866, 300 792, 264 700 C 226 604, 222 492, 252 394 C 278 308, 336 240, 408 200 C 358 178, 306 150, 258 122 Z" fill="url(#goldShine)" filter="url(#glow)"/>
  <path d="M 296 170 C 234 222, 198 308, 196 402 C 192 500, 228 594, 292 660 C 337 710, 394 742, 448 756 C 388 730, 336 686, 305 624 C 271 556, 262 470, 280 390 C 296 318, 338 256, 394 220 C 362 204, 328 187, 296 170 Z" fill="#094A2C"/>
  <path d="M 258 122 C 152 180, 80 295, 62 422 C 42 556, 86 684, 172 774 C 247 856, 354 906, 460 912" fill="none" stroke="url(#goldMain)" stroke-width="5.5" opacity="0.8"/>

  <!-- ═══ BANJAR ORNAMENTS ═══ -->

  <!-- TOP: Tajuk (Spire ornament) -->
  <g transform="translate(232,95)" filter="url(#softShadow)">
    <!-- Spire tip -->
    <polygon points="34,0 42,26 34,18 26,26" fill="url(#goldShine)"/>
    <!-- Main diamond body -->
    <polygon points="34,20 52,40 34,60 16,40" fill="url(#goldMain)"/>
    <polygon points="34,26 46,40 34,52 22,40" fill="#FFE97A" opacity="0.55"/>
    <!-- Side wings -->
    <path d="M 16,40 C 1,33 -1,22 9,17 L 18,30 Z" fill="url(#goldMain)"/>
    <path d="M 52,40 C 67,33 69,22 59,17 L 50,30 Z" fill="url(#goldMain)"/>
    <!-- Lower lotus petals -->
    <path d="M 10,54 C 18,62 26,66 34,66 C 42,66 50,62 58,54 L 52,50 C 46,56 38,59 34,59 C 30,59 22,56 16,50 Z" fill="url(#goldMain)"/>
    <ellipse cx="34" cy="66" rx="18" ry="7" fill="url(#goldMain)"/>
    <!-- Stem -->
    <rect x="32" y="70" width="4" height="18" rx="2" fill="url(#goldMain)"/>
    <!-- Center jewel -->
    <circle cx="34" cy="40" r="6" fill="#FFE97A"/>
    <circle cx="34" cy="40" r="3" fill="#FFFACC"/>
    <!-- Corner dots -->
    <circle cx="8" cy="30" r="3.5" fill="url(#goldMain)"/>
    <circle cx="60" cy="30" r="3.5" fill="url(#goldMain)"/>
    <circle cx="8" cy="50" r="3.5" fill="url(#goldMain)"/>
    <circle cx="60" cy="50" r="3.5" fill="url(#goldMain)"/>
    <!-- Extra small dots -->
    <circle cx="34" cy="10" r="2" fill="#FFE97A"/>
  </g>

  <!-- MIDDLE: Intan (Diamond) Banjar motif -->
  <g transform="translate(82,448)" filter="url(#softShadow)">
    <polygon points="30,0 60,30 30,60 0,30" fill="url(#goldMain)"/>
    <polygon points="30,8 52,30 30,52 8,30" fill="#094A2C"/>
    <polygon points="30,14 46,30 30,46 14,30" fill="url(#goldMain)" opacity="0.75"/>
    <circle cx="30" cy="30" r="8" fill="#FFE97A"/>
    <circle cx="30" cy="30" r="4" fill="#FFFACC"/>
    <!-- 4 tip highlights -->
    <polygon points="30,0 34,9 30,7 26,9" fill="#FFFACC"/>
    <polygon points="60,30 51,34 53,30 51,26" fill="#FFFACC"/>
    <polygon points="30,60 34,51 30,53 26,51" fill="#FFFACC"/>
    <polygon points="0,30 9,34 7,30 9,26" fill="#FFFACC"/>
  </g>

  <!-- LOWER: Small lotus ornament -->
  <g transform="translate(154,726)" filter="url(#softShadow)">
    <polygon points="26,0 34,20 26,14 18,20" fill="url(#goldShine)"/>
    <polygon points="26,16 40,30 26,44 12,30" fill="url(#goldMain)"/>
    <polygon points="26,20 36,30 26,38 16,30" fill="#FFE97A" opacity="0.6"/>
    <circle cx="26" cy="30" r="5.5" fill="#FFE97A"/>
    <circle cx="26" cy="30" r="2.5" fill="#FFFACC"/>
    <path d="M 12,30 C 1,25 0,16 8,13 L 15,24 Z" fill="url(#goldMain)"/>
    <path d="M 40,30 C 51,25 52,16 44,13 L 37,24 Z" fill="url(#goldMain)"/>
    <ellipse cx="26" cy="46" rx="15" ry="6" fill="url(#goldMain)"/>
    <circle cx="8" cy="20" r="3" fill="url(#goldMain)"/>
    <circle cx="44" cy="20" r="3" fill="url(#goldMain)"/>
    <circle cx="8" cy="40" r="3" fill="url(#goldMain)"/>
    <circle cx="44" cy="40" r="3" fill="url(#goldMain)"/>
  </g>

  <!-- Gold accent dots along crescent body -->
  <circle cx="178" cy="286" r="5.5" fill="url(#goldMain)" opacity="0.9"/>
  <circle cx="150" cy="354" r="4.5" fill="url(#goldMain)" opacity="0.8"/>
  <circle cx="132" cy="618" r="4.5" fill="url(#goldMain)" opacity="0.8"/>
  <circle cx="156" cy="688" r="5.5" fill="url(#goldMain)" opacity="0.9"/>
  <path d="M 192 260 Q 148 385 144 515 Q 140 625 174 725"
        fill="none" stroke="url(#goldMain)" stroke-width="2"
        stroke-dasharray="9,8" opacity="0.4"/>

  <!-- ═══ SPEECH BUBBLE ═══ -->
  <rect x="300" y="172" width="572" height="504" rx="90" ry="90" fill="url(#bubbleGrad)" filter="url(#shadow)"/>
  <!-- Tail -->
  <path d="M 358 656 L 288 762 L 476 656 Z" fill="url(#bubbleGrad)" filter="url(#shadow)"/>
  <path d="M 358 645 L 300 708 L 462 645 Z" fill="url(#bubbleGrad)"/>
  <!-- Bubble gold border -->
  <rect x="300" y="172" width="572" height="504" rx="90" ry="90" fill="none" stroke="url(#goldMain)" stroke-width="5" opacity="0.3"/>

  <!-- ═══ LETTER B ═══ -->
  <!-- Vertical bar -->
  <rect x="370" y="248" width="92" height="360" rx="24" ry="24" fill="#094A2C"/>
  <!-- Top bump -->
  <path d="M 440 248 L 592 248 C 666 248 710 289 710 350 C 710 411 666 452 592 452 L 440 452 Z" fill="#094A2C"/>
  <!-- Top bump hole -->
  <path d="M 462 284 L 585 284 C 635 284 664 307 664 350 C 664 393 635 416 585 416 L 462 416 Z" fill="url(#bubbleGrad)"/>
  <!-- Bottom bump (larger) -->
  <path d="M 440 452 L 606 452 C 694 452 742 498 742 562 C 742 626 694 608 606 608 L 440 608 Z" fill="#094A2C"/>
  <!-- Bottom bump hole -->
  <path d="M 462 488 L 598 488 C 666 488 700 516 700 560 C 700 578 684 578 598 578 L 462 578 Z" fill="url(#bubbleGrad)"/>

  <!-- ═══ THREE DOTS ═══ -->
  <circle cx="450" cy="652" r="22" fill="#0A5230"/>
  <circle cx="526" cy="652" r="22" fill="#0A5230"/>
  <circle cx="602" cy="652" r="22" fill="#0A5230"/>

  <!-- ═══ TEXT ═══ -->
  <text x="512" y="888"
        font-family="Georgia,'Times New Roman',serif"
        font-size="90" font-weight="bold"
        fill="url(#ivoryGrad)" text-anchor="middle"
        letter-spacing="5" filter="url(#softShadow)">BAPANDER</text>

  <line x1="305" y1="916" x2="400" y2="916" stroke="url(#goldMain)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="624" y1="916" x2="719" y2="916" stroke="url(#goldMain)" stroke-width="3.5" stroke-linecap="round"/>
  <text x="512" y="950"
        font-family="Georgia,serif" font-size="42"
        fill="url(#goldShine)" text-anchor="middle"
        letter-spacing="14">CHAT</text>

  <!-- Outer gold ring -->
  <rect x="14" y="14" width="996" height="996" rx="204" ry="204"
        fill="none" stroke="url(#goldMain)" stroke-width="8" opacity="0.4"/>

  </g>
</svg>
