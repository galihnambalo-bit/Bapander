name: bapander
description: Bapander - Secure Community Messenger Indonesia-first

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.9

  # UI & Navigation
  google_fonts: ^6.1.0
  go_router: ^12.1.1
  flutter_animate: ^4.3.0

  # Media
  image_picker: ^1.0.5
  file_picker: ^6.1.1
  record: ^5.0.4
  audioplayers: ^5.2.1

  # State Management
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.18.1
  timeago: ^3.6.0
  cached_network_image: ^3.3.0
  image: ^4.1.3
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  uuid: ^4.2.1

  # WebRTC
  flutter_webrtc: ^0.9.47

  # AdMob
  google_mobile_ads: ^4.0.0

  # Marketplace & Auction
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1
  syncfusion_flutter_gauges: ^24.1.41

  # Location / Nearby
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Status / Stories
  story_view: ^0.15.0

  # Anonymous mode
  crypto: ^3.0.3

  # Image compression
  flutter_image_compress: ^2.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
