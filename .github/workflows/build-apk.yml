name: Build Bapander APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bapander
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      - name: Decode secrets
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/bapander-release.jks
          printf "storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=bapander-release.jks\n" > android/key.properties
      - run: flutter pub get
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons --split-per-abi
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: bapander-release-arm64
          path: bapander/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      - name: Upload arm APK
        uses: actions/upload-artifact@v4
        with:
          name: bapander-release-arm32
          path: bapander/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
