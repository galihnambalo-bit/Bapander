name: Build Bapander APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bapander
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug --no-tree-shake-icons --target-platform android-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: bapander-debug-apk
          path: bapander/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  build-release:
    name: Build Release APK (Kecil)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bapander
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/bapander-release.jks
          printf "storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=bapander-release.jks\n" > android/key.properties
      - run: flutter pub get
      - name: Build Release APK arm64
        run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64
      - name: Build Release APK arm (HP lama)
        run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: bapander-release-arm64
          path: bapander/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: bapander-release-arm
          path: bapander/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
        if: success()
