name: Deploy to Play Store

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build AAB and Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bapander
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Decode secrets
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/bapander-release.jks
          printf "storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=bapander-release.jks\n" > android/key.properties

      - run: flutter pub get

      - name: Build Release AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.bapander.app
          releaseFiles: bapander/build/app/outputs/bundle/release/app-release.aab
          track: internal
          inAppUpdatePriority: 3
          whatsNewDirectory: whatsnew/